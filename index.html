<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易博客系统</title>
    <style>
        /* 新增音乐播放器样式 */
        .music-player {
            margin: 20px 0;
            max-width: 330px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
        }
        .music-input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <!-- 原有登录表单保持不变 -->

    <!-- 修改后的博客内容部分 -->
    <div class="blog-container" id="blogContainer">
        <h1>我的博客</h1>
        <button onclick="showPostForm()">新建文章</button>

        <!-- 新增固定位置音乐播放器 -->
        <div class="music-player">
            <h3>背景音乐</h3>
            <iframe 
                frameborder="no" 
                border="0" 
                marginwidth="0" 
                marginheight="0" 
                width="330" 
                height="86" 
                src="//music.163.com/outchain/player?type=2&id=26664394&auto=0&height=66">
            </iframe>
        </div>

        <!-- 修改后的新建文章表单 -->
        <div id="postForm" class="hidden">
            <h3>新建文章</h3>
            <form onsubmit="return addPost(event)">
                <div>
                    <input type="text" id="postTitle" placeholder="标题" required>
                </div>
                <div>
                    <textarea id="postContent" rows="4" placeholder="内容" required></textarea>
                </div>
                <!-- 新增音乐外链输入 -->
                <div>
                    <input type="text" 
                           id="musicLink" 
                           class="music-input"
                           placeholder="粘贴网易云音乐外链代码（可选）">
                    <small>获取方式：在网易云音乐网页版找到歌曲 → 生成外链播放器 → 复制iframe代码</small>
                </div>
                <button type="submit">发布</button>
                <button type="button" onclick="hidePostForm()">取消</button>
            </form>
        </div>

        <!-- 原有文章列表保持不变 -->
    </div>

    <script>
        // 修改后的addPost函数
        function addPost(e) {
            e.preventDefault();
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const musicCode = document.getElementById('musicLink').value;

            const postDiv = document.createElement('div');
            postDiv.className = 'post';
            postDiv.innerHTML = `
                <h3>${title}</h3>
                <p>${content}</p >
                ${musicCode ? `<div class="music-player">${musicCode}</div>` : ''}
                <small>作者：${document.getElementById('username').value} | 发布时间：${new Date().toLocaleString()}</small>
            `;

            document.getElementById('posts').prepend(postDiv);
            hidePostForm();
            return false;
        }
    </script>
</body>
</html>
